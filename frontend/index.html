<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Geo Events - Cliente</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>Geo Events</h1>
  <p>Aplicación demo para consumir la API de eventos urbanos geolocalizados.</p>

  <section class="form-section">
    <h2>Registrar evento</h2>
    <form id="event-form">
      <label>Título:
        <input type="text" id="title" required />
      </label>
      <label>Descripción:
        <textarea id="description"></textarea>
      </label>
      <label>Categoría:
        <input type="text" id="category" placeholder="bache, luminaria, cultural..." />
      </label>
      <div>
        <button type="button" id="get-location">Obtener mi ubicación</button>
      </div>
      <label>Latitud:
        <input type="text" id="latitude" readonly />
      </label>
      <label>Longitud:
        <input type="text" id="longitude" readonly />
      </label>
      <button type="submit">Guardar evento</button>
    </form>
  </section>

  <section>
    <h2>Eventos registrados</h2>
    <ul id="events-list"></ul>
  </section>

  <script src="app.js"></script>
</body>
</html>
